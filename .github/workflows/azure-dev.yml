name: Azure Dev — Provision & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target azd environment
        type: choice
        required: true
        default: dev
        options:
          - dev
          - staging
          - production
      deploy_backstage:
        description: Deploy Demo 3 (Backstage portal)
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: azure-dev-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Job 1: .NET API (Demo 2) ─────────────────────────────────────────────
  provision-deploy:
    name: Provision & Deploy API (azd)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    env:
      AZURE_ENV_NAME: ${{ inputs.environment || 'dev' }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZD_INITIAL_ENVIRONMENT_CONFIG: ${{ secrets.AZD_INITIAL_ENVIRONMENT_CONFIG }}

    outputs:
      resource_group: ${{ steps.azd-outputs.outputs.resource_group }}
      acr_name: ${{ steps.azd-outputs.outputs.acr_name }}
      acr_endpoint: ${{ steps.azd-outputs.outputs.acr_endpoint }}
      cae_id: ${{ steps.azd-outputs.outputs.cae_id }}
      kv_name: ${{ steps.azd-outputs.outputs.kv_name }}
      app_insights_cs: ${{ steps.azd-outputs.outputs.app_insights_cs }}
      api_uri: ${{ steps.azd-outputs.outputs.api_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v1

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: azd login (federated)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: dotnet restore + build + test
        working-directory: apps/sample-dotnet-api
        run: |
          dotnet restore src/sample-dotnet-api.csproj
          dotnet restore tests/sample-dotnet-api.Tests.csproj
          dotnet build src/sample-dotnet-api.csproj --configuration Release --no-restore
          dotnet build tests/sample-dotnet-api.Tests.csproj --configuration Release --no-restore
          dotnet test  tests/sample-dotnet-api.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: azd provision
        run: azd provision --no-prompt

      - name: azd deploy (API only)
        run: azd deploy --service api --no-prompt

      - name: Capture azd outputs
        id: azd-outputs
        run: |
          eval "$(azd env get-values)"
          echo "resource_group=${AZURE_RESOURCE_GROUP}"        >> "$GITHUB_OUTPUT"
          echo "acr_name=${AZURE_CONTAINER_REGISTRY_NAME}"    >> "$GITHUB_OUTPUT"
          echo "acr_endpoint=${AZURE_CONTAINER_REGISTRY_ENDPOINT}" >> "$GITHUB_OUTPUT"
          echo "cae_id=${AZURE_CONTAINER_APPS_ENVIRONMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "kv_name=${AZURE_KEY_VAULT_NAME}"              >> "$GITHUB_OUTPUT"
          echo "app_insights_cs=${APPLICATIONINSIGHTS_CONNECTION_STRING}" >> "$GITHUB_OUTPUT"
          echo "api_uri=${SERVICE_API_URI}"                   >> "$GITHUB_OUTPUT"

      - name: Publish API URL to job summary
        run: |
          eval "$(azd env get-values)"
          {
            echo "## API Deployment complete"
            echo ""
            echo "**Environment:** \`${AZURE_ENV_NAME}\`  **Region:** \`${AZURE_LOCATION}\`"
            echo ""
            if [[ -n "${SERVICE_API_URI:-}" ]]; then
              echo "**API:** ${SERVICE_API_URI}"
              echo ""
              echo "\`\`\`bash"
              echo "curl ${SERVICE_API_URI}/health"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Job 2: Backstage (Demo 3) — only when explicitly requested ───────────
  deploy-backstage:
    name: Build & Deploy Backstage (Demo 3)
    runs-on: ubuntu-latest
    needs: provision-deploy
    if: ${{ inputs.deploy_backstage == true }}
    environment: ${{ inputs.environment || 'dev' }}

    env:
      AZURE_ENV_NAME: ${{ inputs.environment || 'dev' }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_RESOURCE_GROUP: ${{ needs.provision-deploy.outputs.resource_group }}
      AZURE_CONTAINER_REGISTRY_NAME: ${{ needs.provision-deploy.outputs.acr_name }}
      AZURE_CONTAINER_REGISTRY_ENDPOINT: ${{ needs.provision-deploy.outputs.acr_endpoint }}
      AZURE_CONTAINER_APPS_ENVIRONMENT_ID: ${{ needs.provision-deploy.outputs.cae_id }}
      AZURE_KEY_VAULT_NAME: ${{ needs.provision-deploy.outputs.kv_name }}
      APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ needs.provision-deploy.outputs.app_insights_cs }}
      # Demo 3 secrets — configure these in your GitHub environment
      BACKSTAGE_POSTGRES_PASSWORD: ${{ secrets.BACKSTAGE_POSTGRES_PASSWORD }}
      AUTH_MICROSOFT_CLIENT_ID: ${{ secrets.AUTH_MICROSOFT_CLIENT_ID }}
      AUTH_MICROSOFT_CLIENT_SECRET: ${{ secrets.AUTH_MICROSOFT_CLIENT_SECRET }}
      AUTH_MICROSOFT_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      GITHUB_TOKEN: ${{ secrets.SCAFFOLDER_GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Demo 3 infrastructure (PostgreSQL + Backstage Container App)
        run: |
          az deployment group create \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --template-file infra/bicep/demo3.bicep \
            --parameters \
              environmentName="${AZURE_ENV_NAME}" \
              containerRegistryName="${AZURE_CONTAINER_REGISTRY_NAME}" \
              keyVaultName="${AZURE_KEY_VAULT_NAME}" \
              containerAppsEnvironmentId="${AZURE_CONTAINER_APPS_ENVIRONMENT_ID}" \
              appInsightsConnectionString="${APPLICATIONINSIGHTS_CONNECTION_STRING}" \
              postgresPassword="${BACKSTAGE_POSTGRES_PASSWORD}" \
              msClientId="${AUTH_MICROSOFT_CLIENT_ID}" \
              msClientSecret="${AUTH_MICROSOFT_CLIENT_SECRET}" \
              msTenantId="${AUTH_MICROSOFT_TENANT_ID}" \
              githubToken="${GITHUB_TOKEN}" \
            --output json > /tmp/demo3-out.json

          BACKSTAGE_URI="$(jq -r '.properties.outputs.BACKSTAGE_URI.value' /tmp/demo3-out.json)"
          echo "BACKSTAGE_URI=${BACKSTAGE_URI}" >> "$GITHUB_ENV"
          echo "backstage_uri=${BACKSTAGE_URI}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ACR
        run: az acr login --name "${AZURE_CONTAINER_REGISTRY_NAME}"

      - name: Build and push Backstage image
        run: |
          IMAGE_TAG="${AZURE_ENV_NAME}-${{ github.sha }}"
          FULL_IMAGE="${AZURE_CONTAINER_REGISTRY_ENDPOINT}/backstage:${IMAGE_TAG}"
          LATEST_IMAGE="${AZURE_CONTAINER_REGISTRY_ENDPOINT}/backstage:latest"

          docker buildx build \
            --file platform/backstage/Dockerfile \
            --tag "${FULL_IMAGE}" \
            --tag "${LATEST_IMAGE}" \
            --push \
            --cache-from type=registry,ref="${AZURE_CONTAINER_REGISTRY_ENDPOINT}/backstage:buildcache" \
            --cache-to type=registry,ref="${AZURE_CONTAINER_REGISTRY_ENDPOINT}/backstage:buildcache",mode=max \
            .

          echo "BACKSTAGE_IMAGE=${FULL_IMAGE}" >> "$GITHUB_ENV"

      - name: Deploy image to Container App
        run: |
          az containerapp update \
            --name "ca-backstage-${AZURE_ENV_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${BACKSTAGE_IMAGE}" \
            --output table

      - name: Verify Backstage health
        run: |
          chmod +x scripts/verify-demo3.sh
          ./scripts/verify-demo3.sh

      - name: Publish Backstage URL to job summary
        run: |
          {
            echo "## Backstage Deployment complete (Demo 3)"
            echo ""
            echo "**Environment:** \`${AZURE_ENV_NAME}\`"
            echo ""
            echo "**Backstage URL:** ${BACKSTAGE_URI}"
            echo ""
            echo "\`\`\`bash"
            echo "curl ${BACKSTAGE_URI}/healthcheck"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
