name: PR Validate

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: pr-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bicep-validate:
    name: Bicep build + what-if
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: az bicep build
        run: az bicep build --file infra/bicep/main.bicep

      - name: az deployment sub what-if
        run: |
          az deployment sub what-if \
            --location canadacentral \
            --template-file infra/bicep/main.bicep \
            --parameters environmentName=pr-${{ github.event.pull_request.number }}

  dotnet-build:
    name: .NET build + test + format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        working-directory: apps/sample-dotnet-api
        run: |
          dotnet restore src/sample-dotnet-api.csproj
          dotnet restore tests/sample-dotnet-api.Tests.csproj

      - name: Build
        working-directory: apps/sample-dotnet-api
        run: |
          dotnet build src/sample-dotnet-api.csproj   --configuration Release --no-restore
          dotnet build tests/sample-dotnet-api.Tests.csproj --configuration Release --no-restore

      - name: Test
        working-directory: apps/sample-dotnet-api
        run: dotnet test tests/sample-dotnet-api.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Verify formatting
        working-directory: apps/sample-dotnet-api
        run: |
          dotnet format src/sample-dotnet-api.csproj   --verify-no-changes --no-restore
          dotnet format tests/sample-dotnet-api.Tests.csproj --verify-no-changes --no-restore
