# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json
name: code-to-cloud-demo
metadata:
  template: code-to-cloud-demo@1.0.0
services:
  # Demo 2 — .NET API on Container Apps
  api:
    project: ./apps/sample-dotnet-api/src
    language: dotnet
    host: containerapp
    docker:
      path: ../Dockerfile
      context: ..

  # Demo 3 — Backstage Developer Portal on Container Apps
  # azd deploy --service backstage builds from platform/backstage/Dockerfile
  # with the repo root as build context (needed to copy catalog/ into the image).
  backstage:
    project: ./platform/backstage
    host: containerapp
    docker:
      path: ./Dockerfile
      # Build context is repo root so the Dockerfile can COPY catalog/ and platform/backstage/
      context: .

hooks:
  preprovision:
    shell: sh
    run: ./scripts/preprovision.sh
    continueOnError: false
    interactive: true
  postprovision:
    shell: sh
    run: ./scripts/postprovision.sh
    continueOnError: true
    interactive: false

infra:
  provider: bicep
  path: ./infra/bicep
  module: main
